<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" role="img" aria-labelledby="title desc">
  <title id="title">宿のキーワードを鑑定文へ翻訳する5段階</title>
  <desc id="desc">抽象的なキーワードを実際の行動、強み、注意点、今日からできる提案へ変換する流れ</desc>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f7f3ff"/><stop offset="1" stop-color="#fffaf2"/></linearGradient>
    <marker id="a4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#6d4aff"/></marker>
  </defs>
  <rect width="600" height="720" rx="28" fill="url(#bg4)"/>
  <text x="300" y="45" text-anchor="middle" font-family="sans-serif" font-size="25" font-weight="700" fill="#4b2f9f">抽象的な宿の言葉を、使える鑑定へ</text>
  <text x="300" y="76" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#625b73">「行動力」を例に、5つの順番で翻訳します</text>

  <rect x="70" y="106" width="460" height="84" rx="20" fill="#6d4aff"/>
  <circle cx="112" cy="148" r="24" fill="#fff" opacity=".18"/>
  <text x="112" y="157" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#fff">1</text>
  <text x="160" y="140" font-family="sans-serif" font-size="19" font-weight="700" fill="#fff">宿のキーワード</text>
  <text x="160" y="169" font-family="sans-serif" font-size="24" font-weight="700" fill="#fff">「行動力」</text>
  <path d="M300 191V222" stroke="#6d4aff" stroke-width="3" marker-end="url(#a4)"/>

  <rect x="70" y="228" width="460" height="84" rx="20" fill="#fff" stroke="#9b8ae8" stroke-width="2"/>
  <circle cx="112" cy="270" r="24" fill="#eee8ff"/>
  <text x="112" y="279" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#4b2f9f">2</text>
  <text x="160" y="259" font-family="sans-serif" font-size="19" font-weight="700" fill="#4b2f9f">実際の行動</text>
  <text x="160" y="289" font-family="sans-serif" font-size="17" fill="#625b73">思いついたら、まず小さく動いて試す</text>
  <path d="M300 313V344" stroke="#6d4aff" stroke-width="3" marker-end="url(#a4)"/>

  <rect x="70" y="350" width="460" height="84" rx="20" fill="#f1fbf5" stroke="#69b681" stroke-width="2"/>
  <circle cx="112" cy="392" r="24" fill="#dff4e6"/>
  <text x="112" y="401" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#287541">3</text>
  <text x="160" y="381" font-family="sans-serif" font-size="19" font-weight="700" fill="#287541">強み</text>
  <text x="160" y="411" font-family="sans-serif" font-size="17" fill="#53645a">ゼロから始める役割で瞬発力を発揮する</text>
  <path d="M300 435V466" stroke="#6d4aff" stroke-width="3" marker-end="url(#a4)"/>

  <rect x="70" y="472" width="460" height="84" rx="20" fill="#fff7ec" stroke="#d6b354" stroke-width="2"/>
  <circle cx="112" cy="514" r="24" fill="#f8e9bd"/>
  <text x="112" y="523" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#805b00">4</text>
  <text x="160" y="503" font-family="sans-serif" font-size="19" font-weight="700" fill="#805b00">疲れたときの注意点</text>
  <text x="160" y="533" font-family="sans-serif" font-size="17" fill="#6c6042">勢いが強くなり、確認を飛ばしやすい</text>
  <path d="M300 557V588" stroke="#6d4aff" stroke-width="3" marker-end="url(#a4)"/>

  <rect x="70" y="594" width="460" height="84" rx="20" fill="#fff0f5" stroke="#e7a5bd" stroke-width="2"/>
  <circle cx="112" cy="636" r="24" fill="#f8dbe6"/>
  <text x="112" y="645" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#a52f5c">5</text>
  <text x="160" y="625" font-family="sans-serif" font-size="19" font-weight="700" fill="#a52f5c">今日からできる行動提案</text>
  <text x="160" y="655" font-family="sans-serif" font-size="17" fill="#6d4b58">大切な決定だけは一晩置いて確認する</text>
  <text x="300" y="706" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#4b2f9f">キーワード → 行動 → 強み → 注意点 → 提案</text>
</svg>
